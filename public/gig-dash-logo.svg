<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#2563eb"/>
  
  <!-- Main icon - Trending up chart with dollar sign -->
  <g transform="translate(128, 128)">
    <!-- Chart background -->
    <rect x="40" y="120" width="200" height="120" rx="8" fill="white" opacity="0.1"/>
    
    <!-- Chart lines -->
    <path d="M60 200 L100 160 L140 180 L180 120 L220 100 L260 80" 
          stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Chart dots -->
    <circle cx="60" cy="200" r="6" fill="white"/>
    <circle cx="100" cy="160" r="6" fill="white"/>
    <circle cx="140" cy="180" r="6" fill="white"/>
    <circle cx="180" cy="120" r="6" fill="white"/>
    <circle cx="220" cy="100" r="6" fill="white"/>
    <circle cx="260" cy="80" r="6" fill="white"/>
    
    <!-- Dollar sign -->
    <g transform="translate(320, 140)">
      <circle cx="40" cy="40" r="40" fill="white" opacity="0.9"/>
      <text x="40" y="52" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#2563eb">$</text>
    </g>
    
    <!-- Small sparkle elements -->
    <circle cx="80" cy="60" r="3" fill="white" opacity="0.7"/>
    <circle cx="200" cy="40" r="2" fill="white" opacity="0.6"/>
    <circle cx="280" cy="80" r="2" fill="white" opacity="0.6"/>
    <circle cx="60" cy="40" r="2" fill="white" opacity="0.5"/>
  </g>
  
  <!-- Optional: Add a subtle gradient overlay -->
  <defs>
    <radialGradient id="logoGradient" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="1"/>
    </radialGradient>
  </defs>
  
  <!-- Apply gradient to background -->
  <circle cx="256" cy="256" r="256" fill="url(#logoGradient)"/>
</svg> 