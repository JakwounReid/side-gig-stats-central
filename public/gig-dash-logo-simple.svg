<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#2563eb"/>
  
  <!-- Main trending up icon -->
  <g transform="translate(128, 128)">
    <!-- Chart line -->
    <path d="M80 240 L160 160 L240 120 L320 80" 
          stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Chart dots -->
    <circle cx="80" cy="240" r="8" fill="white"/>
    <circle cx="160" cy="160" r="8" fill="white"/>
    <circle cx="240" cy="120" r="8" fill="white"/>
    <circle cx="320" cy="80" r="8" fill="white"/>
    
    <!-- Dollar sign overlay -->
    <circle cx="200" cy="160" r="50" fill="white" opacity="0.95"/>
    <text x="200" y="175" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#2563eb">$</text>
  </g>
</svg> 